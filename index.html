<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學訓練計畫主持人工作坊 🚀</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 將照片設為背景，並加上一層半透明漸層遮罩，確保文字與玻璃面板清晰可見 */
            background: linear-gradient(rgba(76, 29, 149, 0.6), rgba(219, 39, 119, 0.6)), url('https://raw.githubusercontent.com/linmenggann/TrainingWorkshop8/main/%E5%90%B3%E5%9C%92__A1_A%E7%89%88.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* 玻璃擬物化 (Glassmorphism) 特效 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        /* 輸入框專屬樣式 */
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.6);
            outline: none;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* 確保下拉選單選項在白色背景下字體可見 */
        option {
            background-color: #2d3748;
            color: white;
        }

        /* 自訂單選按鈕 (Radio) */
        .custom-radio:checked + div {
            background-color: rgba(255, 255, 255, 0.9);
            color: #7e22ce;
            font-weight: bold;
            transform: scale(1.05);
            border-color: transparent;
        }
        .custom-radio-bg {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8 text-white relative overflow-x-hidden">

    <!-- 裝飾用漂浮圓球 -->
    <div class="absolute top-10 left-10 w-32 h-32 bg-purple-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse"></div>
    <div class="absolute bottom-10 right-10 w-40 h-40 bg-pink-400 rounded-full mix-blend-multiply filter blur-2xl opacity-50 animate-pulse" style="animation-delay: 2s;"></div>

    <main class="glass-panel rounded-3xl w-full max-w-3xl p-6 sm:p-10 relative z-10">
        <!-- 標題區塊 -->
        <header class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-black mb-4 tracking-wider drop-shadow-lg">
                ✨ 教學訓練計畫 <br class="sm:hidden"> 主持人工作坊 ✨
            </h1>
            
            <!-- 活動資訊卡片 -->
            <div class="inline-block bg-white/20 rounded-2xl p-4 sm:p-6 text-left border border-white/20 shadow-lg mt-4 backdrop-blur-sm">
                <p class="text-lg font-medium flex items-center gap-2 mb-2">
                    <span class="text-xl">📅</span> 日期：<span class="font-bold text-pink-200 text-xl tracking-wide">2026 / 01 / 25</span>
                </p>
                <p class="text-lg font-medium flex items-center gap-2 mb-2">
                    <span class="text-xl">⏰</span> 時間：9:00 ~ 16:00
                </p>
                <p class="text-lg font-medium flex items-center gap-2">
                    <span class="text-xl">📍</span> 地點：奇美醫院 第五醫療大樓 6樓563會議室
                </p>
            </div>
        </header>

        <!-- 報名表單 -->
        <form id="workshopForm" class="space-y-6" onsubmit="submitForm(event)">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- 姓名 -->
                <div class="space-y-2">
                    <label for="name" class="block text-sm font-bold tracking-wide">👤 姓名</label>
                    <input type="text" id="name" required placeholder="請輸入您的姓名" 
                           class="glass-input w-full rounded-xl px-4 py-3">
                </div>

                <!-- 職稱 -->
                <div class="space-y-2">
                    <label for="title" class="block text-sm font-bold tracking-wide">💼 職稱</label>
                    <input type="text" id="title" required placeholder="請輸入您的職稱" 
                           class="glass-input w-full rounded-xl px-4 py-3">
                </div>
            </div>

            <!-- 機構名 -->
            <div class="space-y-2">
                <label for="institution" class="block text-sm font-bold tracking-wide">🏥 機構名</label>
                <input type="text" id="institution" required placeholder="請輸入您所屬機構" 
                       class="glass-input w-full rounded-xl px-4 py-3">
            </div>

            <!-- 負責職類 (下拉式選單) -->
            <div class="space-y-2">
                <label for="category" class="block text-sm font-bold tracking-wide">🎯 負責的職類</label>
                <div class="relative">
                    <select id="category" required class="glass-input w-full rounded-xl px-4 py-3 appearance-none cursor-pointer">
                        <option value="" disabled selected>請選擇職類 🔽</option>
                        <option value="藥事">💊 藥事</option>
                        <option value="醫事放射">☢️ 醫事放射</option>
                        <option value="醫事檢驗">🔬 醫事檢驗</option>
                        <option value="護理">🩺 護理</option>
                        <option value="營養">🥗 營養</option>
                        <option value="呼吸治療">🫁 呼吸治療</option>
                        <option value="聽力">👂 聽力</option>
                        <option value="物理治療">🏃 物理治療</option>
                        <option value="職能治療">🧩 職能治療</option>
                        <option value="臨床心理">🧠 臨床心理</option>
                        <option value="語言治療">🗣️ 語言治療</option>
                        <option value="其他">📌 其他</option>
                    </select>
                    <!-- 自訂下拉箭頭圖示 -->
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <!-- 兩欄式聯絡資訊 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <!-- Email -->
                <div class="space-y-2">
                    <label for="email" class="block text-sm font-bold tracking-wide">📧 Email</label>
                    <input type="email" id="email" required placeholder="example@email.com" 
                           class="glass-input w-full rounded-xl px-4 py-3">
                </div>

                <!-- 聯繫電話 -->
                <div class="space-y-2">
                    <label for="phone" class="block text-sm font-bold tracking-wide">📞 聯繫電話</label>
                    <input type="tel" id="phone" required placeholder="請輸入聯絡電話" 
                           class="glass-input w-full rounded-xl px-4 py-3">
                </div>
            </div>

            <div class="border-t border-white/20 my-6"></div>

            <!-- 單選題區塊 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                <!-- 問題 1 -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold tracking-wide">❓ 您目前是否擔任教學訓練計畫主持人？</label>
                    <div class="flex gap-4">
                        <label class="relative flex-1 cursor-pointer">
                            <input type="radio" name="isDirector" value="是" class="custom-radio sr-only" required>
                            <div class="custom-radio-bg w-full py-3 px-4 rounded-xl border border-white/30 text-center glass-input hover:bg-white/20">
                                🙆‍♂️ 是的
                            </div>
                        </label>
                        <label class="relative flex-1 cursor-pointer">
                            <input type="radio" name="isDirector" value="否" class="custom-radio sr-only">
                            <div class="custom-radio-bg w-full py-3 px-4 rounded-xl border border-white/30 text-center glass-input hover:bg-white/20">
                                🙅‍♂️ 不是
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 問題 2 -->
                <div class="space-y-3">
                    <label class="block text-sm font-bold tracking-wide">💻 您預計以何種方式參與？</label>
                    <div class="flex gap-4">
                        <label class="relative flex-1 cursor-pointer">
                            <input type="radio" name="participateMode" value="實體" class="custom-radio sr-only" required>
                            <div class="custom-radio-bg w-full py-3 px-4 rounded-xl border border-white/30 text-center glass-input hover:bg-white/20">
                                🙋‍♀️ 實體參與
                            </div>
                        </label>
                        <label class="relative flex-1 cursor-pointer">
                            <input type="radio" name="participateMode" value="線上" class="custom-radio sr-only">
                            <div class="custom-radio-bg w-full py-3 px-4 rounded-xl border border-white/30 text-center glass-input hover:bg-white/20">
                                🌐 線上參與
                            </div>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 送出按鈕 -->
            <div class="pt-6">
                <button type="submit" 
                        class="w-full py-4 rounded-xl text-lg font-black tracking-widest text-purple-900 bg-gradient-to-r from-pink-300 via-purple-300 to-indigo-300 hover:from-pink-200 hover:via-purple-200 hover:to-indigo-200 transform transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:shadow-pink-500/30 focus:outline-none focus:ring-4 focus:ring-purple-300">
                    🚀 立即報名送出！
                </button>
            </div>
            
            <!-- 成功訊息 (預設隱藏) -->
            <div id="successMsg" class="hidden mt-4 p-4 bg-green-400/20 border border-green-400/50 rounded-xl text-center backdrop-blur-md">
                🎉 報名成功！期待您的參與！
            </div>
        </form>

        <!-- 聯絡資訊 Footer -->
        <footer class="mt-12 pt-6 border-t border-white/20 text-sm sm:text-base text-center sm:flex sm:justify-between sm:text-left text-gray-200">
            <div>
                <span class="font-bold">🏢 主辦單位：</span>奇美醫院教學部
            </div>
            <div class="mt-2 sm:mt-0 flex flex-col sm:items-end gap-1">
                <span><span class="font-bold">🧑‍💼 聯絡人：</span>陳大頭</span>
                <span><span class="font-bold">☎️ 聯繫電話：</span>06-281-2811 分機 57112233</span>
            </div>
        </footer>
    </main>

    <script>
        // 【重要】請將下方的字串替換為您剛剛部署的 Google Apps Script 網頁應用程式 URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzTJYJKKno2SE9Ufo9j89zo0b120nZD3n1Wd02TQe-0axF1MJg9QSN63rEZnzdpSCjQNQ/exec';
        const MAX_CAPACITY = 4; // ⭐ 新增：設定報名人數上限

        // ⭐ 新增：網頁載入時自動檢查目前報名人數
        window.onload = checkCapacity;

        function checkCapacity() {
            const btn = document.querySelector('button[type="submit"]');
            btn.innerHTML = '⏳ 檢查名額中...';
            btn.disabled = true;

            fetch(scriptURL)
                .then(response => response.json())
                .then(res => {
                    if (res.status === 'success') {
                        const currentCount = res.data.length;
                        if (currentCount >= MAX_CAPACITY) {
                            setFormFull();
                        } else {
                            btn.innerHTML = `🚀 立即報名送出！ (剩餘 ${MAX_CAPACITY - currentCount} 名)`;
                            btn.disabled = false;
                        }
                    }
                })
                .catch(error => {
                    console.error('檢查名額失敗', error);
                    btn.innerHTML = '🚀 立即報名送出！';
                    btn.disabled = false;
                });
        }

        function setFormFull() {
            const btn = document.querySelector('button[type="submit"]');
            btn.innerHTML = '🚫 報名已額滿';
            btn.classList.remove('from-pink-300', 'via-purple-300', 'to-indigo-300', 'hover:-translate-y-1', 'text-purple-900');
            btn.classList.add('bg-gray-500', 'text-white', 'cursor-not-allowed');
            btn.disabled = true;

            // 禁用所有輸入框與選項
            const inputs = document.querySelectorAll('input, select');
            inputs.forEach(input => input.disabled = true);

            // 顯示額滿提示
            const msg = document.getElementById('successMsg');
            msg.innerHTML = '🛑 感謝您的支持，本活動報名人數已達上限（4名），已停止受理報名。';
            msg.classList.remove('hidden', 'bg-green-400/20', 'border-green-400/50');
            msg.classList.add('bg-red-500/80', 'border-red-400/50', 'text-white', 'shadow-lg');
        }

        function submitForm(event) {
            event.preventDefault(); // 阻止網頁重新整理
            const btn = document.querySelector('button[type="submit"]');
            const msg = document.getElementById('successMsg');
            
            // 變更按鈕狀態為處理中
            btn.innerHTML = '⏳ 處理中...';
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            // 收集表單各欄位資料
            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('title', document.getElementById('title').value);
            formData.append('institution', document.getElementById('institution').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('email', document.getElementById('email').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('isDirector', document.querySelector('input[name="isDirector"]:checked').value);
            formData.append('participateMode', document.querySelector('input[name="participateMode"]:checked').value);

            // 發送 POST 請求至您的 Google Sheets Apps Script，並加入 mode: 'no-cors' 解決跨網域(CORS)讀取錯誤問題
            fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
                .then(response => {
                    // 成功回傳後的按鈕特效
                    btn.innerHTML = '✅ 已成功送出！';
                    btn.classList.remove('from-pink-300', 'via-purple-300', 'to-indigo-300', 'hover:-translate-y-1', 'text-purple-900');
                    btn.classList.add('bg-green-400', 'text-green-900', 'font-extrabold');
                    
                    // 顯示成功訊息
                    msg.innerHTML = '🎉 報名成功！期待您的參與！';
                    msg.classList.remove('hidden', 'bg-red-500/80', 'border-red-400/50', 'text-white', 'shadow-lg');
                    msg.classList.add('bg-green-400/20', 'border-green-400/50', 'animate-bounce');

                    // 將表單欄位清空以便下一個人填寫
                    document.getElementById('workshopForm').reset();

                    // ⭐ 修改：設定 3 秒後恢復UI並重新檢查名額
                    setTimeout(() => {
                        btn.classList.remove('opacity-75', 'cursor-not-allowed', 'bg-green-400', 'text-green-900', 'font-extrabold');
                        btn.classList.add('from-pink-300', 'via-purple-300', 'to-indigo-300', 'hover:-translate-y-1', 'text-purple-900');
                        
                        msg.classList.add('hidden');
                        msg.classList.remove('animate-bounce');
                        
                        checkCapacity(); // 重新檢查是否額滿，若達4名會自動鎖死
                    }, 3000);
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    btn.innerHTML = '❌ 送出失敗，請再試一次';
                    btn.disabled = false;
                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                });
        }
    </script>
</body>
</html>
